# NOTE: vault API calls are simulated right now, and will be hooked up to sandbox in later commit.
---

- name: Display validation header
  debug:
    msg:
      - "========================================="
      - " VAULT VALIDATION REPORT"
      - " Host: {{ ansible_facts['hostname'] }}"
      - " System: {{ ansible_facts['system'] }}"
      - "========================================="

- name: Validate Vault configuration variables
  assert:
    that:
      - vault_secret_paths is defined
      - vault_secret_paths | length > 0
    fail_msg: "Vault configuration is missing required secret paths"

# Simulated Vault connectivity
- name: Validate Vault connectivity (simulated)
  debug:
    msg: "PASS - Vault endpoint reachable (simulation mode)"

# Simulate validation (intentionally fail backup for demo)
- name: Simulate Vault secret validation
  set_fact:
    vault_validation_results: "{{ vault_validation_results | default([]) + [ {'path': item, 'status': ( 'FAIL' if 'backup' in item else 'PASS' ) } ] }}"
  loop: "{{ vault_secret_paths }}"

# Display per-secret results (dynamic PASS/FAIL)
- name: Display Vault validation results
  debug:
    msg: "{{ item.status }} - {{ item.path }}"
  loop: "{{ vault_validation_results }}"

# Enforce validation (pipeline-style)
- name: Enforce Vault validation (fail if missing)
  assert:
    that:
      - item.status == "PASS"
    fail_msg: "FAIL - Vault secret missing: {{ item.path }}"
    success_msg: "PASS - Vault secret exists: {{ item.path }}"
  loop: "{{ vault_validation_results }}"
  ignore_errors: true   # keeps playbook running for demo

# Determine overall status
- name: Determine overall Vault validation status
  set_fact:
    vault_overall_status: >-
      {{ 'FAIL' if (vault_validation_results | selectattr('status','equalto','FAIL') | list | length > 0)
         else 'PASS' }}

# Final summary
- name: Display final validation summary
  debug:
    msg:
      - "-----------------------------------------"
      - " FINAL STATUS: {{ vault_overall_status }}"
      - "-----------------------------------------"

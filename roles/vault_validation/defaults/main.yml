---
# Vault connection (do NOT hardcode secrets later)
vault_url: "https://vault.example.com"
vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"

# SAP HANA / S4PCE expected secrets
vault_secret_paths:
  - secret/data/sap/hana/system
  - secret/data/sap/hana/sidadm
  - secret/data/sap/hana/backup
  - secret/data/sap/hana/monitoring

# Fail behavior
vault_fail_on_missing: false
